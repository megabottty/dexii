<div [style.background-color]="theme.colors().bg" [style.color]="theme.colors().text" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Times New Roman', serif; padding: 20px; position: relative; overflow: hidden; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);">

  <!-- Glamour Accents (Floating Glows) -->
  <div *ngIf="theme.mode() === 'light'" style="position: absolute; top: -10%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 70%); filter: blur(60px); pointer-events: none;"></div>
  <div *ngIf="theme.mode() === 'light'" style="position: absolute; bottom: -10%; left: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(219, 39, 119, 0.1) 0%, transparent 70%); filter: blur(50px); pointer-events: none;"></div>

  <!-- Content -->
  <div style="text-align: center; max-width: 400px; width: 100%; position: relative; z-index: 10;">

    <!-- Luxurious Icon -->
    <div [style.background]="'linear-gradient(135deg, ' + theme.colors().primary + ', ' + theme.colors().accent + ')'"
         [style.box-shadow]="theme.mode() === 'light' ? '0 15px 30px rgba(219, 39, 119, 0.2)' : '0 10px 15px rgba(0,0,0,0.5)'"
         style="width: 90px; height: 90px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px auto; transform: rotate(-3deg); transition: transform 0.5s ease;">
      <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" fill="none" viewBox="0 0 24 24" stroke="white">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
    </div>

    <h2 [style.letter-spacing]="theme.mode() === 'light' ? '4px' : '1px'"
        style="font-size: 38px; font-weight: 200; margin-bottom: 12px; text-transform: uppercase;">Dexii</h2>
    <p [style.color]="theme.colors().textSecondary"
       [style.letter-spacing]="'6px'"
       style="font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 60px;">The Private Vault</p>

    <!-- Chic Indicators -->
    <div style="display: flex; gap: 24px; justify-content: center; margin-bottom: 64px;">
      @for (dot of [1,2,3,4]; track $index) {
        <div [style.background-color]="enteredPin().length > $index ? theme.colors().primary : 'transparent'"
             [style.border]="'1px solid ' + (enteredPin().length > $index ? theme.colors().primary : theme.colors().textSecondary)"
             [style.box-shadow]="enteredPin().length > $index ? '0 0 15px ' + theme.colors().primary : 'none'"
             style="width: 12px; height: 12px; border-radius: 50%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
      }
    </div>

    <!-- Glamour Pad -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; width: 100%;">
      @for (num of [1,2,3,4,5,6,7,8,9]; track num) {
        <button (click)="handleInput(num.toString())"
                [style.background]="'transparent'"
                [style.border]="'1px solid ' + theme.colors().border"
                [style.color]="theme.colors().text"
                style="height: 80px; border-radius: 40px; font-size: 28px; font-weight: 200; cursor: pointer; transition: all 0.3s; font-family: 'Times New Roman', serif;">
          {{ num }}
        </button>
      }
      <button (click)="theme.toggleTheme()" [style.color]="theme.colors().textSecondary" style="background: none; border: none; font-size: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;">
        {{ theme.mode() === 'dark' ? 'Pearl' : 'Onyx' }}
      </button>
      <button (click)="handleInput('0')"
              [style.background]="'transparent'"
              [style.border]="'1px solid ' + theme.colors().border"
              [style.color]="theme.colors().text"
              style="height: 80px; border-radius: 40px; font-size: 28px; font-weight: 200; cursor: pointer; font-family: 'Times New Roman', serif;">0</button>
      <button (click)="clear()" [style.color]="theme.colors().primary" style="background: none; border: none; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;">Clear</button>
    </div>

    <!-- Footer -->
    <div style="margin-top: 80px; opacity: 0.5;">
      <span [style.color]="theme.colors().textSecondary" style="font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px;">Exclusive Identity CRM</span>
    </div>

  </div>
</div>
