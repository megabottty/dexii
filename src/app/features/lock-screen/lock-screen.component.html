<div [style.background-color]="theme.colors().bg" [style.color]="theme.colors().text" class="lock-screen-component__s1">

  @if (theme.mode() === 'light') {
    <div class="lock-screen-component__s2"></div>
    <div class="lock-screen-component__s3"></div>
  }

  <div class="lock-screen-component__s4">
    <app-page-hint
      hintKey="lock_inline"
      title="Lock Screen Hint"
      message="Use your 4-digit PIN to unlock.">
    </app-page-hint>

    <div [style.background]="'linear-gradient(135deg, ' + theme.colors().primary + ', ' + theme.colors().accent + ')'"
         [style.box-shadow]="theme.mode() === 'light' ? '0 15px 30px rgba(219, 39, 119, 0.2)' : '0 10px 15px rgba(0,0,0,0.5)'"
         class="lock-screen-component__s5">
      <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" fill="none" viewBox="0 0 24 24" stroke="white">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
    </div>

    <h2 [style.letter-spacing]="theme.mode() === 'light' ? '4px' : '1px'"
        class="lock-screen-component__s6">Dexii</h2>
    <p [style.color]="theme.colors().textSecondary" [style.letter-spacing]="'4px'" class="lock-screen-component__s7">
      The Private Vault
    </p>
    <p [style.color]="theme.colors().textSecondary" class="lock-screen-component__s8">
      Enter your 4-digit PIN
    </p>

    @if (errorMessage()) {
      <p class="lock-screen-component__s9">{{ errorMessage() }}</p>
    }

    <div class="lock-screen-component__s15">
      @for (dot of [1,2,3,4]; track $index) {
        <div [style.background-color]="enteredPin().length > $index ? theme.colors().primary : 'transparent'"
             [style.border]="'1px solid ' + (enteredPin().length > $index ? theme.colors().primary : theme.colors().textSecondary)"
             [style.box-shadow]="enteredPin().length > $index ? '0 0 15px ' + theme.colors().primary : 'none'"
             class="lock-screen-pin-dot"></div>
      }
    </div>

    <div class="lock-screen-component__s16">
      @for (num of [1,2,3,4,5,6,7,8,9]; track num) {
        <button (click)="handleInput(num.toString())"
                [style.background]="'transparent'"
                [style.border]="'1px solid ' + theme.colors().border"
                [style.color]="theme.colors().text"
                class="lock-screen-component__s17">
          {{ num }}
        </button>
      }

      <button (click)="theme.toggleTheme()" [style.color]="theme.colors().textSecondary" class="lock-screen-component__s18">
        {{ theme.mode() === 'dark' ? 'Pearl' : 'Onyx' }}
      </button>
      <button (click)="handleInput('0')"
              [style.background]="'transparent'"
              [style.border]="'1px solid ' + theme.colors().border"
              [style.color]="theme.colors().text"
              class="lock-screen-component__s19">0</button>
      <button (click)="clear()" [style.color]="theme.colors().primary" class="lock-screen-component__s20">Clear</button>
    </div>

    <div class="lock-screen-component__s21">
      <button routerLink="/login" [style.color]="theme.colors().textSecondary" [style.border]="'1px solid ' + theme.colors().border" class="lock-screen-aux-btn">
        Switch Account
      </button>
    </div>

    <div class="lock-screen-component__s22">
      <span [style.color]="theme.colors().textSecondary" class="lock-screen-component__s23">Exclusive Identity CRM</span>
    </div>
  </div>
</div>
